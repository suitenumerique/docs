name: Bug Report
description: File a bug report.
title: "🐛(Bug)  "
labels: ["triage"]
projects: ["suitenumerique/2"]
assignees:
  - virgile-dev
type: bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: markdown
    attributes:
      value: |
        Before filing a new issue, please do a quick search in the issues / prs list to avoid duplicates.
  - type: markdown
    attributes:
      value: |
        We use [BlockNote](https://www.blocknotejs.org/) for the text editing features of Docs. If you find an issue with the editor and are able to reproduce it on their [demo](https://www.blocknotejs.org/demo) it's best to report it directly on the [BlockNote repository](https://github.com/TypeCellOS/BlockNote/issues).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Possible solution?
      description: If you have suggestions on a fix for the bug
      placeholder: Try this, or that ...
      value: "I have a solution!"
    validations:
      required: false
  - type: textarea
    id: version
    attributes:
      label: Version
      description: What version of our software are you running?
      value: "4.x.x"
    validations:
      required: false
  - type: input
    id: instance
    attributes:
      label: Instance url
      description: What's your instance url?
      value: "docs.example.org"
    validations:
      required: false
  - type: dropdown
    id: browsers
    attributes:
      label: What browsers are you seeing the problem on?
      multiple: true
      options:
        - Firefox
        - Chrome
        - Safari
        - Microsoft Edge
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
  - type: upload
    id: screenshots
    attributes:
      label: Upload screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true