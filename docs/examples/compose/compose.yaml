services:
  postgresql:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 1s
      timeout: 2s
      retries: 300
    env_file:
      - env.d/postgresql
      - env.d/common
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./data/databases/backend:/var/lib/postgresql/data/pgdata

  redis:
    image: redis:8

  backend:
    image: lasuite/impress-backend:latest
    user: ${DOCKER_USER:-1000}
    restart: always
    environment:
      - DJANGO_CONFIGURATION=Production
    env_file:
      - env.d/common
      - env.d/backend
      - env.d/yprovider
      - env.d/postgresql
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 15s
      timeout: 30s
      retries: 20
      start_period: 10s
    depends_on:
      postgresql:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started

  # Conversion endpoint only (/api/convert/); realtime collaboration is
  # served by the yhub service below.
  y-provider:
    image: lasuite/impress-y-provider:latest
    user: ${DOCKER_USER:-1000}
    env_file:
      - env.d/common
      - env.d/yprovider

  # Realtime collaboration server (routed by nginx via ${YHUB_HOST}).
  # Requires Redis >= 6.2 and a PostgreSQL database for its document cache.
  yhub:
    image: lasuite/impress-yhub:latest
    user: ${DOCKER_USER:-1000}
    environment:
      - REDIS_URL=redis://redis:6379
      # Must match the credentials in env.d/postgresql
      - POSTGRES_URL=postgres://docs:${DB_PASSWORD}@postgresql:5432/docs
    env_file:
      - env.d/common
      - env.d/yprovider
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: lasuite/impress-frontend:latest
    user: "101"
    entrypoint:
      - /docker-entrypoint.sh
    command: ["nginx", "-g", "daemon off;"]
    env_file:
      - env.d/common
    # Uncomment and set your values if using our nginx proxy example
    #environment:
    # - VIRTUAL_HOST=${DOCS_HOST} # used by nginx proxy
    # - VIRTUAL_PORT=8083 # used by nginx proxy
    # - LETSENCRYPT_HOST=${DOCS_HOST} # used by lets encrypt to generate TLS certificate
    volumes:
      - ./default.conf.template:/etc/nginx/templates/docs.conf.template
    depends_on:
      backend:
        condition: service_healthy

# Uncomment if using our nginx proxy example
#    networks:
#    - proxy-tier
#    - default

# Uncomment if using our nginx proxy example
#networks:
#  proxy-tier:
#    external: true
